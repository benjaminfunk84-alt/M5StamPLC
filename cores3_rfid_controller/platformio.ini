; M5CoreS3 RFID-Controller – Kommunikation per ESP-NOW (kein WLAN nötig)
; Stack: CoreS3, FAN, PWRCAN, LAN, 4Relay, PPS, USB, CatM

[env:cores3]
platform = espressif32
board = m5stack-cores3
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
; CoreS3 (VID:PID=303A:8120, M5Stack CoreS3 UiFlow2) – meist /dev/ttyACM0
upload_port = /dev/ttyACM0

build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=4
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    https://github.com/m5stack/M5Unified.git
    https://github.com/m5stack/M5GFX.git
    bblanchon/ArduinoJson
    https://github.com/OSSLibraries/Arduino_MFRC522v2.git

; Fallback falls m5stack-cores3 nicht gefunden wird
[env:cores3_esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=4
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    https://github.com/m5stack/M5Unified.git
    https://github.com/m5stack/M5GFX.git
    bblanchon/ArduinoJson
