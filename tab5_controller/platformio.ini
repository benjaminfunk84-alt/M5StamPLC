; M5Tab5 Controller – ESP32-P4 + C6 (WiFi/ESP-NOW via C6 SDIO2)
; pioarduino fork für ESP32-P4 Arduino-Support

[env:tab5]
platform     = https://github.com/pioarduino/platform-espressif32.git#54.03.21
framework    = arduino
board        = esp32-p4-evboard
board_build.mcu        = esp32p4
board_build.flash_mode = qio
upload_speed   = 1500000
monitor_speed  = 115200
; Tab5 hängt an ttyACM1 (ESP32-P4 USB-C)
upload_port  = /dev/ttyACM1

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    https://github.com/M5Stack/M5Unified.git
    https://github.com/M5Stack/M5GFX.git
    bblanchon/ArduinoJson
