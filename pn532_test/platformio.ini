; PN532 Modul-Test – nur CoreS3 + PN532 an Port A (I2C Wire1)
; Kein M5/Display, nur Serial + Wire1 + Adafruit_PN532

[env:pn532]
platform = espressif32
board = m5stack-cores3
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
upload_port = /dev/ttyACM0
extra_scripts = pre:upload_find_cores3_port.py

build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=4
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    https://github.com/m5stack/M5Unified.git
    https://github.com/adafruit/Adafruit-PN532.git

[env:pn532_esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=4
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    https://github.com/m5stack/M5Unified.git
    https://github.com/adafruit/Adafruit-PN532.git
