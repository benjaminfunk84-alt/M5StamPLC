; M5StampPLC – Build & Upload in Cursor (ohne Arduino IDE)
; Display: M5StamPLC + M5Unified + M5GFX werden automatisch geladen.

[env:m5stamplc]
platform = espressif32
board = m5stack-stamps3
framework = arduino
upload_speed = 1500000
monitor_speed = 115200

; Build-Flags wie in M5-Doku für StamPLC (Stamp-S3A Modul)
build_flags =
    -DCORE_DEBUG_LEVEL=4
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

; Alle Display-Bibliotheken: M5StamPLC zieht M5Unified nach, M5Unified nutzt M5GFX
lib_deps =
    https://github.com/m5stack/M5StamPLC.git
    https://github.com/m5stack/M5Unified.git
    https://github.com/m5stack/M5GFX.git
    bblanchon/ArduinoJson

; Debug-Build (mehr Logs, Debug-Symbole für Breakpoints)
[env:m5stamplc_debug]
platform = espressif32
board = m5stack-stamps3
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
build_type = debug
build_flags =
    -DCORE_DEBUG_LEVEL=5
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    https://github.com/m5stack/M5StamPLC.git
    https://github.com/m5stack/M5Unified.git
    https://github.com/m5stack/M5GFX.git
    bblanchon/ArduinoJson

; Optional: zweites Environment für „nur ESP32-S3“ falls board nicht gefunden wird
[env:m5stamplc_esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=4
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    https://github.com/m5stack/M5StamPLC.git
    https://github.com/m5stack/M5Unified.git
    https://github.com/m5stack/M5GFX.git
    bblanchon/ArduinoJson
